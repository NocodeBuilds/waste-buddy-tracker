<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6b3a" />
    <title>Offline - Hazardous Waste Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8faf7;
        color: #173526;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        width: 100%;
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: #4b6255;
        font-size: 1rem;
        line-height: 1.6;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: #1f6b3a;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>Offline</h1>
      <p>The tracker is installed, but this page needs a network connection before it can load fresh compliance data.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
